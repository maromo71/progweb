<!doctype html>
<html lang="pt-br">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>
<body>
    <div class="container mb-3 mt-3">
        <h1>Menu da Pizzaria</h1>
    </div>
    <div class="container">
        <table class="table table-bordered table-hover">
            <thead>
                <tr class="table-dark">
                    <th>Núm.</th>
                    <th>Descrição</th>
                    <th>Preço</th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td>11</td>
                    <td>Mussarela com manjericão</td>
                    <td class="text-end">R$ 69,87</td>
                </tr>
                <tr>
                    <td>12</td>
                    <td>Catupiry com manjericão</td>
                    <td class="text-end">R$ 66,87</td>
                </tr>
                <tr>
                    <td>13</td>
                    <td>Mussarela de Búfala com manjericção</td>
                    <td class="text-end">R$ 70,87</td>
                </tr>
                <tr>
                    <td>14</td>
                    <td>Quatro queijos com manjericção</td>
                    <td class="text-end">R$ 56,87</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
