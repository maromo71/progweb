<!doctype html>
<html lang="pt-br">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
</head>

<body>
    <div class="container-fluid bg-dark text-white p-3 mb-4 text-center text-capitalize">
        <h1>Cadastro de Contribuintes</h1>
    </div>
    <div class="container">
        <div class="row">
            <div class="col-md-12 col-lg-2"></div>
            <div class="col-md-12 col-lg-8">
                <form>
                    <div class="mb-3">
                        <label class="form-label" for="nome">Nome do Contribuinte: </label>
                        <input class="form-control" type="text" name="nome" id="nome">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="telefone">Telefone: </label>
                        <input class="form-control" type="text" name="telefone" id="telefone">
                    </div>
                    <div class="mb-3">
                        <label class="form-label" for="email">E-mail: </label>
                        <input class="form-control" type="email" name="email" id="email">
                    </div>
                    <input class="btn btn-primary" type="submit" value="Enviar">
                    <input class="btn btn-danger" type="reset" value="Limpar">
                </form>
            </div>
            <div class="col-md-12 col-lg-2"></div>
        </div>
    </div>

    <div class="container-fluid fixed-bottom bg-dark text-white p-1 text-center">   
        <p class="text-center"><small>Todos os direitos reservados</small></p>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
