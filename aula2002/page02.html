<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Tabela</title>

</head>

<body>
    <h1>Tabela de Mercadorias - Papelaria</h1>
    <h2>Lista atual de mercadorias:</h2>
    <!-- Tabela comum -->
    <table border="1">
        <thead>
            <tr>
                <td colspan="3">Produtos</td>
            </tr>
            <tr>
                <th>Código</th>
                <th>Descrição</th>
                <th>Preço</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>123</td>
                <td>Lápis Faber Castel</td>
                <td>5,89</td>
            </tr>
            <tr>
                <td>234</td>
                <td>Caneta Faber Castel</td>
                <td>7,89</td>
            </tr>
            <tr>
                <td>456</td>
                <td>Borracha Apagadora </td>
                <td>3,90</td>
            </tr>
        </tbody>

    </table>
</body>

</html>
