<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo de Seletores CSS</title>
    <link rel="stylesheet" href="css/estilo.css">
</head>

<body>
    <h1>Explorando Seletores CSS</h1>
    <p>Este é um parágrafo simples para demonstrar <span class="destaque">seletores de
            classe</span> e <span id="importante">seletores de ID</span>.</p>
    <p data-custom="special">Este parágrafo utiliza um seletor de atributo.</p>
    <p class="destaque" id="importante" data-custom="special">Este parágrafo combina
        múltiplos seletores: classe, ID e atributo.</p>
</body>

</html>
