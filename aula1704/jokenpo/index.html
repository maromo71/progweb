<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jokenpô na Aula</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        .choice-btn { font-size: 2rem; transition: transform 0.2s; }
        .choice-btn:hover { transform: scale(1.1); }
        #resultado { font-weight: bold; }
    </style>
</head>
<body class="bg-light">

    <div class="container py-5 text-center">
        <h1 class="mb-4">Pedra, Papel ou Tesoura</h1>
        <p class="lead">Escolha sua jogada:</p>

        <div class="d-flex justify-content-center gap-3 mb-5">
            <button id="pedra" class="btn btn-outline-primary btn-lg choice-btn">✊<br>Pedra</button>
            <button id="papel" class="btn btn-outline-primary btn-lg choice-btn">✋<br>Papel</button>
            <button id="tesoura" class="btn btn-outline-primary btn-lg choice-btn">✌️<br>Tesoura</button>
        </div>

        <div class="card mx-auto shadow-sm" style="max-width: 400px;">
            <div class="card-body">
                <h5 class="card-title text-muted">Resultado</h5>
                <hr>
                <p id="jogada-computador" class="mb-2">O computador escolheu: -</p>
                <p id="resultado" class="fs-4">-</p>
            </div>
        </div>
        
        <button id="reset" class="btn btn-secondary mt-4 btn-sm">Reiniciar Placar</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
